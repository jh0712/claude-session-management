<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Session Manager</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --green: #3fb950;
      --orange: #d29922;
      --user-bg: #1c2333;
      --assistant-bg: #1a1e2a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    header h1 { font-size: 24px; font-weight: 600; }

    .stats { color: var(--text-muted); font-size: 14px; }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .search-input {
      flex: 1;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .search-input:focus { border-color: var(--accent); }

    .filter-select {
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    .session-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .session-card:hover { border-color: var(--accent); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .card-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .project-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--accent);
    }

    .full-conv-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--green);
      color: #fff;
      font-weight: 500;
    }

    .timestamp {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .project-path {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-family: monospace;
    }

    .summary {
      font-size: 14px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .msg-count {
      font-size: 12px;
      color: var(--text-muted);
    }

    .resume-btn {
      padding: 4px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
      font-size: 12px;
      cursor: pointer;
      font-family: monospace;
      transition: all 0.15s;
    }

    .resume-btn:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .copied-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--green);
      color: #fff;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .copied-toast.show { opacity: 1; }

    /* Detail panel */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
    }

    .detail-overlay.open { display: block; }

    .detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 680px;
      max-width: 90vw;
      height: 100vh;
      background: var(--bg);
      border-left: 1px solid var(--border);
      z-index: 101;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .detail-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      background: var(--surface);
    }

    .detail-header h2 { font-size: 18px; margin-bottom: 4px; }

    .close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
      padding: 0 4px;
    }

    .close-btn:hover { color: var(--text); }

    .detail-meta {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: var(--surface);
    }

    .detail-meta code {
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12px;
    }

    .detail-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
    }

    .message-item {
      padding: 12px 20px;
      font-size: 14px;
    }

    .message-item.user {
      background: var(--user-bg);
      border-left: 3px solid var(--accent);
    }

    .message-item.assistant {
      background: var(--assistant-bg);
      border-left: 3px solid var(--green);
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .message-role {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .message-role.user { color: var(--accent); }
    .message-role.assistant { color: var(--green); }

    .message-time {
      font-size: 11px;
      color: var(--text-muted);
      font-family: monospace;
    }

    .message-text {
      word-break: break-word;
      white-space: pre-wrap;
    }

    .tool-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
    }

    .tool-tag {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--border);
      color: var(--text-muted);
      font-family: monospace;
    }

    .detail-loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
    }

    /* Daily usage stats */
    .usage-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }

    .usage-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .usage-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .usage-date {
      font-size: 12px;
      color: var(--text-muted);
    }

    .usage-date input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 2px 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .usage-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .usage-stat {
      text-align: center;
    }

    .usage-stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }

    .usage-stat-value.green { color: var(--green); }
    .usage-stat-value.orange { color: var(--orange); }

    .usage-stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .usage-sessions {
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    .usage-sessions-toggle {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 12px;
      cursor: pointer;
      padding: 0;
    }

    .usage-sessions-toggle:hover { text-decoration: underline; }

    .usage-session-list {
      display: none;
      margin-top: 8px;
      font-size: 13px;
    }

    .usage-session-list.open { display: block; }

    .usage-session-name {
      color: var(--accent);
      font-weight: 500;
    }

    .usage-session-id {
      font-family: monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 6px;
      background: var(--bg);
      padding: 1px 5px;
      border-radius: 3px;
    }

    .usage-session-tokens {
      color: var(--text-muted);
      font-family: monospace;
      font-size: 12px;
      white-space: nowrap;
    }

    .match-snippets {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .match-snippet {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      border-left: 2px solid;
      color: var(--text-muted);
      background: var(--bg);
    }

    .match-snippet.user { border-color: var(--accent); }
    .match-snippet.assistant { border-color: var(--green); }

    .match-snippet mark {
      background: rgba(88, 166, 255, 0.25);
      color: var(--accent);
      border-radius: 2px;
    }

    /* Session comparison */
    .usage-session-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }

    .usage-session-row:last-child { border-bottom: none; }

    .usage-session-checkbox {
      width: 15px;
      height: 15px;
      cursor: pointer;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    .compare-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      font-style: italic;
    }

    .compare-btn {
      margin-top: 10px;
      padding: 6px 16px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      display: none;
    }

    .compare-btn:hover { background: var(--accent-hover); }

    /* Comparison modal */
    .compare-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .compare-overlay.open { display: flex; }

    .compare-modal {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 860px;
      max-width: 96vw;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px;
    }

    .compare-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .compare-modal-header h2 { font-size: 18px; font-weight: 700; }

    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .compare-col {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .compare-alias-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .compare-alias-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .compare-alias-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .compare-alias-input {
      padding: 7px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      width: 100%;
    }

    .compare-alias-input:focus { border-color: var(--accent); }

    .compare-col-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 12px;
      word-break: break-word;
    }

    .compare-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }

    .compare-row:last-child { border-bottom: none; }

    .compare-row-label { color: var(--text-muted); }

    .compare-row-value { font-family: monospace; color: var(--text); }

    .compare-row-value.higher { color: var(--orange); font-weight: 600; }
    .compare-row-value.lower  { color: var(--green);  font-weight: 600; }

    .compare-analysis {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .compare-analysis h3 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
    }

    .analysis-item {
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      line-height: 1.6;
    }

    .analysis-item:last-child { border-bottom: none; }

    .analysis-tag {
      display: inline-block;
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 3px;
      margin-right: 6px;
      font-weight: 600;
    }

    .tag-info  { background: rgba(88,166,255,0.2);  color: var(--accent); }
    .tag-warn  { background: rgba(210,153,34,0.2);  color: var(--orange); }
    .tag-good  { background: rgba(63,185,80,0.2);   color: var(--green);  }

    .compare-bar-wrap {
      margin-top: 8px;
    }

    .compare-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 3px;
    }

    .compare-bar-track {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .compare-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s;
    }

    .bar-a { background: var(--accent); }
    .bar-b { background: var(--green); }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Claude Session Manager</h1>
      <div class="stats" id="stats"></div>
    </header>

    <div class="usage-card" id="usageCard" style="display:none"></div>

    <div class="toolbar">
      <input
        class="search-input"
        id="search"
        type="text"
        placeholder="搜尋專案名稱或對話內容..."
      />
      <select class="filter-select" id="projectFilter">
        <option value="">所有專案</option>
      </select>
    </div>

    <div id="sessionList" class="session-list">
      <div class="loading">載入中...</div>
    </div>
  </div>

  <div class="detail-overlay" id="overlay"></div>
  <div class="detail-panel" id="detailPanel" style="display:none">
    <div class="detail-header">
      <div>
        <h2 id="detailTitle"></h2>
        <div style="font-size:12px;color:var(--text-muted)" id="detailSessionId"></div>
      </div>
      <button class="close-btn" id="closeDetail">&times;</button>
    </div>
    <div class="detail-meta" id="detailMeta"></div>
    <div class="detail-messages" id="detailMessages"></div>
  </div>

  <div class="copied-toast" id="toast">已複製 resume 指令</div>

  <!-- Session comparison modal -->
  <div class="compare-overlay" id="compareOverlay">
    <div class="compare-modal">
      <div class="compare-modal-header">
        <h2>Session Token 使用量比較</h2>
        <button class="close-btn" id="closeCompare">&times;</button>
      </div>
      <div class="compare-alias-row" id="compareAliasRow"></div>
      <div class="compare-grid" id="compareGrid"></div>
      <div class="compare-analysis" id="compareAnalysis"></div>
    </div>
  </div>

  <script>
    let allSessions = [];
    let displayedSessions = [];
    let searchDebounceTimer = null;
    let currentQuery = "";
    let currentUsageSessions = [];
    let selectedCompareIds = [];

    function formatTokens(n) {
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
      if (n >= 1_000) return (n / 1_000).toFixed(1) + "K";
      return String(n);
    }

    async function loadUsage(date) {
      const url = date ? `/api/usage?date=${date}` : "/api/usage";
      const res = await fetch(url);
      const data = await res.json();
      renderUsage(data);
    }

    function renderUsage(data) {
      currentUsageSessions = data.sessions || [];
      selectedCompareIds = [];

      const card = document.getElementById("usageCard");
      if (data.sessionCount === 0 && !document.getElementById("usageDatePicker")) {
        card.style.display = "block";
        card.innerHTML = `
          <div class="usage-header">
            <span class="usage-title">今日使用量</span>
            <span class="usage-date">
              <input type="date" id="usageDatePicker" value="${data.date}" />
            </span>
          </div>
          <div style="text-align:center;color:var(--text-muted);padding:8px 0;font-size:13px">今天尚無使用紀錄</div>
        `;
        document.getElementById("usageDatePicker").addEventListener("change", (e) => {
          loadUsage(e.target.value);
        });
        return;
      }

      card.style.display = "block";
      const sessionsHtml = data.sessions.map((s, i) => `
        <div class="usage-session-row">
          <input type="checkbox" class="usage-session-checkbox" data-sid="${escapeHtml(s.sessionId)}" id="cmp-${i}" />
          <span style="flex:1;min-width:0">
            <span class="usage-session-name">${escapeHtml(s.projectName)}</span>
            <span class="usage-session-id">${escapeHtml(s.sessionId)}</span>
          </span>
          <span class="usage-session-tokens">
            ${formatTokens(s.totalTokens)} tokens
            (${s.messageCount} 則回覆, ${escapeHtml(s.model || "unknown")})
          </span>
        </div>
      `).join("");

      card.innerHTML = `
        <div class="usage-header">
          <span class="usage-title">當日使用量</span>
          <span class="usage-date">
            <input type="date" id="usageDatePicker" value="${data.date}" />
          </span>
        </div>
        <div class="usage-grid">
          <div class="usage-stat">
            <div class="usage-stat-value">${data.sessionCount}</div>
            <div class="usage-stat-label">Sessions</div>
          </div>
          <div class="usage-stat">
            <div class="usage-stat-value green">${data.totalMessages}</div>
            <div class="usage-stat-label">Claude 回覆</div>
          </div>
          <div class="usage-stat">
            <div class="usage-stat-value orange">${formatTokens(data.totalInputTokens)}</div>
            <div class="usage-stat-label">Input Tokens</div>
          </div>
          <div class="usage-stat">
            <div class="usage-stat-value orange">${formatTokens(data.totalOutputTokens)}</div>
            <div class="usage-stat-label">Output Tokens</div>
          </div>
          <div class="usage-stat">
            <div class="usage-stat-value">${formatTokens(data.totalCacheCreationTokens)}</div>
            <div class="usage-stat-label">Cache Write</div>
          </div>
          <div class="usage-stat">
            <div class="usage-stat-value">${formatTokens(data.totalCacheReadTokens)}</div>
            <div class="usage-stat-label">Cache Read</div>
          </div>
        </div>
        <div class="usage-sessions">
          <button class="usage-sessions-toggle" id="usageToggle">
            展開各 Session 明細
          </button>
          <div class="usage-session-list" id="usageSessionList">
            ${sessionsHtml}
            <div class="compare-hint" id="compareHint">勾選任兩個 session 以進行比較</div>
            <button class="compare-btn" id="compareBtn">比較選取的 Sessions</button>
          </div>
        </div>
      `;

      document.getElementById("usageDatePicker").addEventListener("change", (e) => {
        loadUsage(e.target.value);
      });
      document.getElementById("usageToggle").addEventListener("click", () => {
        const list = document.getElementById("usageSessionList");
        const open = list.classList.toggle("open");
        document.getElementById("usageToggle").textContent = open ? "收合明細" : "展開各 Session 明細";
      });

      // Checkbox logic
      card.querySelectorAll(".usage-session-checkbox").forEach(cb => {
        cb.addEventListener("change", () => {
          if (cb.checked) {
            if (selectedCompareIds.length >= 2) {
              cb.checked = false;
              return;
            }
            selectedCompareIds.push(cb.dataset.sid);
          } else {
            selectedCompareIds = selectedCompareIds.filter(id => id !== cb.dataset.sid);
          }
          const btn = document.getElementById("compareBtn");
          const hint = document.getElementById("compareHint");
          if (selectedCompareIds.length === 2) {
            btn.style.display = "inline-block";
            hint.textContent = "已選取 2 個 sessions，點擊下方按鈕進行比較";
          } else {
            btn.style.display = "none";
            hint.textContent = `已選取 ${selectedCompareIds.length}/2 個 session`;
          }
        });
      });

      document.getElementById("compareBtn").addEventListener("click", () => {
        if (selectedCompareIds.length === 2) openCompare(selectedCompareIds[0], selectedCompareIds[1]);
      });
    }

    function openCompare(idA, idB) {
      const a = currentUsageSessions.find(s => s.sessionId === idA);
      const b = currentUsageSessions.find(s => s.sessionId === idB);
      if (!a || !b) return;

      const defaultLabel = (s) => `${s.projectName} (${s.sessionId.slice(0, 8)}…)`;

      document.getElementById("compareAliasRow").innerHTML = `
        <div class="compare-alias-field">
          <span class="compare-alias-label">Session A <span class="usage-session-id">${escapeHtml(a.sessionId)}</span></span>
          <input class="compare-alias-input" id="aliasA" placeholder="${escapeHtml(defaultLabel(a))}" />
        </div>
        <div class="compare-alias-field">
          <span class="compare-alias-label">Session B <span class="usage-session-id">${escapeHtml(b.sessionId)}</span></span>
          <input class="compare-alias-input" id="aliasB" placeholder="${escapeHtml(defaultLabel(b))}" />
        </div>
      `;

      const getAlias = (s, inputId) => {
        const el = document.getElementById(inputId);
        return (el && el.value.trim()) ? el.value.trim() : defaultLabel(s);
      };

      const rerender = () => renderCompareContent(a, b, getAlias(a, "aliasA"), getAlias(b, "aliasB"));

      document.getElementById("aliasA").addEventListener("input", rerender);
      document.getElementById("aliasB").addEventListener("input", rerender);

      rerender();
      document.getElementById("compareOverlay").classList.add("open");
    }

    function renderCompareContent(a, b, labelA, labelB) {
      const label = (s) => s === a ? labelA : labelB;

      const fields = [
        { key: "totalTokens",         label: "Total Tokens",        higherIsBad: true },
        { key: "inputTokens",         label: "Input Tokens",        higherIsBad: true },
        { key: "outputTokens",        label: "Output Tokens",       higherIsBad: false },
        { key: "cacheCreationTokens", label: "Cache Write Tokens",  higherIsBad: false },
        { key: "cacheReadTokens",     label: "Cache Read Tokens",   higherIsBad: false },
        { key: "messageCount",        label: "Messages",            higherIsBad: false },
      ];

      function colHtml(s, other) {
        return fields.map(f => {
          const val = s[f.key] || 0;
          const otherVal = other[f.key] || 0;
          let cls = "";
          if (val > otherVal) cls = f.higherIsBad ? "higher" : "";
          else if (val < otherVal) cls = f.higherIsBad ? "lower" : "";
          return `
            <div class="compare-row">
              <span class="compare-row-label">${f.label}</span>
              <span class="compare-row-value ${cls}">${f.key === "messageCount" ? val : formatTokens(val)}</span>
            </div>`;
        }).join("");
      }

      function barPct(valA, valB) {
        const max = Math.max(valA, valB, 1);
        return { pctA: (valA / max * 100).toFixed(1), pctB: (valB / max * 100).toFixed(1) };
      }

      const barFields = [
        { key: "totalTokens",         label: "Total Tokens" },
        { key: "outputTokens",        label: "Output Tokens" },
        { key: "cacheReadTokens",     label: "Cache Read" },
        { key: "cacheCreationTokens", label: "Cache Write" },
      ];

      const barsHtml = barFields.map(f => {
        const vA = a[f.key] || 0, vB = b[f.key] || 0;
        const { pctA, pctB } = barPct(vA, vB);
        return `
          <div class="compare-bar-wrap">
            <div class="compare-bar-label"><span>${escapeHtml(labelA)}</span><span>${formatTokens(vA)}</span></div>
            <div class="compare-bar-track"><div class="compare-bar-fill bar-a" style="width:${pctA}%"></div></div>
            <div class="compare-bar-label"><span>${escapeHtml(labelB)}</span><span>${formatTokens(vB)}</span></div>
            <div class="compare-bar-track"><div class="compare-bar-fill bar-b" style="width:${pctB}%"></div></div>
          </div>`;
      }).join("");

      const analyses = [];
      const totalDiff = a.totalTokens && b.totalTokens
        ? (Math.abs(a.totalTokens - b.totalTokens) / Math.max(a.totalTokens, b.totalTokens) * 100).toFixed(1)
        : 0;
      const bigger = a.totalTokens >= b.totalTokens ? a : b;
      const smaller = a.totalTokens >= b.totalTokens ? b : a;
      analyses.push(`<span class="analysis-tag tag-info">總量</span><b>${escapeHtml(label(bigger))}</b> 的 token 用量比 <b>${escapeHtml(label(smaller))}</b> 多 <b>${totalDiff}%</b>（${formatTokens(bigger.totalTokens)} vs ${formatTokens(smaller.totalTokens)}）`);

      const cacheRatioA = a.totalTokens ? ((a.cacheReadTokens || 0) / a.totalTokens * 100).toFixed(1) : 0;
      const cacheRatioB = b.totalTokens ? ((b.cacheReadTokens || 0) / b.totalTokens * 100).toFixed(1) : 0;
      const betterCache = parseFloat(cacheRatioA) >= parseFloat(cacheRatioB) ? a : b;
      const worseCacheRatio = parseFloat(cacheRatioA) < parseFloat(cacheRatioB) ? cacheRatioA : cacheRatioB;
      const betterCacheRatio = Math.max(parseFloat(cacheRatioA), parseFloat(cacheRatioB)).toFixed(1);
      analyses.push(`<span class="analysis-tag tag-good">Cache</span><b>${escapeHtml(label(betterCache))}</b> 的 cache read 比例較高（${betterCacheRatio}%），有效降低實際 token 消耗；對比另一方 ${worseCacheRatio}%`);

      const outRatioA = a.inputTokens ? ((a.outputTokens || 0) / Math.max(a.inputTokens, 1)).toFixed(2) : 0;
      const outRatioB = b.inputTokens ? ((b.outputTokens || 0) / Math.max(b.inputTokens, 1)).toFixed(2) : 0;
      analyses.push(`<span class="analysis-tag tag-info">Output/Input</span><b>${escapeHtml(labelA)}</b>：${outRatioA}x，<b>${escapeHtml(labelB)}</b>：${outRatioB}x — 比值高代表 Claude 回覆較長`);

      const tpmA = a.messageCount ? Math.round(a.totalTokens / a.messageCount) : 0;
      const tpmB = b.messageCount ? Math.round(b.totalTokens / b.messageCount) : 0;
      const heavierMsg = tpmA >= tpmB ? a : b;
      analyses.push(`<span class="analysis-tag tag-warn">每則成本</span><b>${escapeHtml(labelA)}</b> 每則訊息 ${formatTokens(tpmA)} tokens，<b>${escapeHtml(labelB)}</b> ${formatTokens(tpmB)} tokens — <b>${escapeHtml(label(heavierMsg))}</b> 每次對話成本較高`);

      if ((a.cacheCreationTokens || 0) > 0 || (b.cacheCreationTokens || 0) > 0) {
        const highCreate = (a.cacheCreationTokens || 0) >= (b.cacheCreationTokens || 0) ? a : b;
        analyses.push(`<span class="analysis-tag tag-info">Cache 建立</span><b>${escapeHtml(label(highCreate))}</b> 的 cache 寫入量較多（${formatTokens(highCreate.cacheCreationTokens)}），代表本次對話產生較多新 context 快取`);
      }

      document.getElementById("compareGrid").innerHTML = `
        <div class="compare-col">
          <div class="compare-col-title">${escapeHtml(labelA)}</div>
          ${colHtml(a, b)}
        </div>
        <div class="compare-col">
          <div class="compare-col-title">${escapeHtml(labelB)}</div>
          ${colHtml(b, a)}
        </div>
      `;

      document.getElementById("compareAnalysis").innerHTML = `
        <h3>分析摘要</h3>
        ${analyses.map(t => `<div class="analysis-item">${t}</div>`).join("")}
        <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:14px">
          <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text-muted)">Token 分佈視覺化</div>
          ${barsHtml}
        </div>
      `;
    }

    async function loadSessions() {
      const res = await fetch("/api/sessions");
      allSessions = await res.json();
      displayedSessions = allSessions;
      populateProjectFilter();
      renderSessions();
    }

    function populateProjectFilter() {
      const projects = [...new Set(allSessions.map(s => s.projectName))].sort();
      const select = document.getElementById("projectFilter");
      for (const p of projects) {
        const opt = document.createElement("option");
        opt.value = p;
        opt.textContent = p;
        select.appendChild(opt);
      }
    }

    function formatDate(ts) {
      if (!ts) return "";
      const d = new Date(ts);
      const now = new Date();
      const diffMs = now - d;
      const diffDays = Math.floor(diffMs / 86400000);

      if (diffDays === 0) return `今天 ${d.toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" })}`;
      if (diffDays === 1) return `昨天 ${d.toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" })}`;
      if (diffDays < 7) return `${diffDays} 天前`;
      return d.toLocaleDateString("zh-TW", { month: "short", day: "numeric" });
    }

    function formatFullDate(ts) {
      if (!ts) return "";
      return new Date(ts).toLocaleString("zh-TW", {
        year: "numeric", month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit", second: "2-digit"
      });
    }

    function highlightQuery(text, query) {
      if (!query) return escapeHtml(text);
      const escaped = escapeHtml(text);
      const escapedQuery = escapeHtml(query).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return escaped.replace(new RegExp(escapedQuery, "gi"), m => `<mark>${m}</mark>`);
    }

    function applyProjectFilter(sessions) {
      const project = document.getElementById("projectFilter").value;
      if (!project) return sessions;
      return sessions.filter(s => s.projectName === project);
    }

    async function onSearchInput() {
      const query = document.getElementById("search").value.trim();
      currentQuery = query;

      if (!query) {
        displayedSessions = allSessions;
        renderSessions();
        return;
      }

      // Show loading state
      document.getElementById("stats").textContent = "搜尋中...";

      const res = await fetch(`/api/sessions?q=${encodeURIComponent(query)}`);
      const results = await res.json();

      // Guard: ignore stale response if query changed
      if (query !== currentQuery) return;

      displayedSessions = results;
      renderSessions();
    }

    function renderSessions() {
      const filtered = applyProjectFilter(displayedSessions);
      const list = document.getElementById("sessionList");
      const stats = document.getElementById("stats");
      const isSearching = currentQuery.length > 0;

      stats.textContent = isSearching
        ? `搜尋「${currentQuery}」：找到 ${filtered.length} 個 sessions`
        : `共 ${allSessions.length} 個 sessions，顯示 ${filtered.length} 個`;

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state">${isSearching ? "沒有找到符合的 session" : "沒有 sessions"}</div>`;
        return;
      }

      list.innerHTML = filtered.map(s => {
        const matchesHtml = s.matches && s.matches.length > 0
          ? `<div class="match-snippets">${s.matches.map(m => `
              <div class="match-snippet ${m.role}">${highlightQuery(m.snippet, currentQuery)}</div>
            `).join("")}</div>`
          : "";

        return `
          <div class="session-card" data-id="${s.sessionId}">
            <div class="card-header">
              <div class="card-header-left">
                <span class="project-name">${escapeHtml(s.projectName)}</span>
                ${s.hasFullConversation ? '<span class="full-conv-badge">完整對話</span>' : ''}
              </div>
              <span class="timestamp">${formatDate(s.lastMessageAt)}</span>
            </div>
            <div class="project-path">${escapeHtml(s.project)}</div>
            <div class="summary">${escapeHtml(s.summary)}</div>
            ${matchesHtml}
            <div class="card-footer">
              <span class="msg-count">${s.messageCount} 則訊息</span>
              <button class="resume-btn" data-cmd="${escapeHtml(s.resumeCommand)}" onclick="event.stopPropagation(); copyResume(this)">
                複製 resume 指令
              </button>
            </div>
          </div>
        `;
      }).join("");

      list.querySelectorAll(".session-card").forEach(card => {
        card.addEventListener("click", () => openDetail(card.dataset.id));
      });
    }

    async function openDetail(sessionId) {
      // Show panel immediately with loading state
      document.getElementById("detailTitle").textContent = "載入中...";
      document.getElementById("detailSessionId").textContent = sessionId;
      document.getElementById("detailMeta").innerHTML = "";
      document.getElementById("detailMessages").innerHTML = '<div class="detail-loading">載入完整對話中...</div>';
      document.getElementById("overlay").classList.add("open");
      document.getElementById("detailPanel").style.display = "flex";

      // Fetch full session detail (with conversation)
      const res = await fetch(`/api/sessions/${sessionId}`);
      if (!res.ok) return;
      const s = await res.json();

      document.getElementById("detailTitle").textContent = s.projectName;
      document.getElementById("detailMeta").innerHTML = `
        <div>專案路徑：<code>${escapeHtml(s.project)}</code></div>
        <div>Resume 指令：<code>${escapeHtml(s.resumeCommand)}</code>
          <button class="resume-btn" style="margin-left:8px" data-cmd="${escapeHtml(s.resumeCommand)}" onclick="copyResume(this)">複製</button>
        </div>
        <div>時間範圍：${formatFullDate(s.firstMessageAt)} ~ ${formatFullDate(s.lastMessageAt)}</div>
        <div>訊息數量：${s.messageCount}${s.hasFullConversation ? '（含 Claude 回覆）' : '（僅使用者訊息）'}</div>
      `;

      const messagesHtml = s.messages.map(m => {
        const roleClass = m.role || "user";
        const roleLabel = m.role === "assistant" ? "Claude" : "You";
        const toolsHtml = m.toolUse && m.toolUse.length > 0
          ? `<div class="tool-tags">${m.toolUse.map(t => `<span class="tool-tag">${escapeHtml(t)}</span>`).join("")}</div>`
          : "";

        return `
          <div class="message-item ${roleClass}">
            <div class="message-header">
              <span class="message-role ${roleClass}">${roleLabel}</span>
              <span class="message-time">${formatFullDate(m.timestamp)}</span>
            </div>
            <div class="message-text">${escapeHtml(m.text)}</div>
            ${toolsHtml}
          </div>
        `;
      }).join("");

      document.getElementById("detailMessages").innerHTML =
        messagesHtml || '<div class="detail-loading">沒有對話紀錄</div>';
    }

    function closeDetail() {
      document.getElementById("overlay").classList.remove("open");
      document.getElementById("detailPanel").style.display = "none";
    }

    function copyResume(btn) {
      navigator.clipboard.writeText(btn.dataset.cmd);
      const toast = document.getElementById("toast");
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function escapeHtml(str) {
      if (!str) return "";
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById("search").addEventListener("input", () => {
      clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(onSearchInput, 300);
    });
    document.getElementById("projectFilter").addEventListener("change", renderSessions);
    document.getElementById("closeDetail").addEventListener("click", closeDetail);
    document.getElementById("overlay").addEventListener("click", closeDetail);
    document.getElementById("closeCompare").addEventListener("click", () => {
      document.getElementById("compareOverlay").classList.remove("open");
    });
    document.getElementById("compareOverlay").addEventListener("click", (e) => {
      if (e.target === document.getElementById("compareOverlay"))
        document.getElementById("compareOverlay").classList.remove("open");
    });
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") {
        closeDetail();
        document.getElementById("compareOverlay").classList.remove("open");
      }
    });

    loadSessions();
    loadUsage();
  </script>
</body>
</html>
